# ============================================================================
# 📦 KSR-SQL-Whitelist
# --------------------
# Ein Minecraft Paper/Spigot Plugin, das die Vanilla-Whitelist
# vollständig durch eine SQL-basierte Lösung ersetzt.
#
# Autor: Timy Liniger
# Website: https://ksrminecraft.ch/
# Version: 1.3
# ============================================================================

name: KSR-SQL-Whitelist
version: '1.3'
main: ch.ksrminecraft.kSRSQLWhitelist.KSRSQLWhitelist
api-version: '26.1'
authors: ["Timy Liniger"]
description: SQL-backed whitelist management
website: https://ksrminecraft.ch/

# --------------------------------------------------------------------------
# ⚙️ PERMISSIONS
# --------------------------------------------------------------------------
# Die folgenden Permissions steuern den Zugriff auf die verschiedenen
# Whitelist-Befehle. Standardmässig sind alle nur für Operatoren (op) erlaubt.
# --------------------------------------------------------------------------

permissions:

  # 🔑 Gesamte Rechtegruppe für das Plugin
  KSRSQLWhitelist.*:
    description: Grants access to all SQL-Whitelist actions
    children:
      KSRSQLWhitelist.add: true
      KSRSQLWhitelist.del: true
      KSRSQLWhitelist.on: true
      KSRSQLWhitelist.off: true
      whitelist.staff: true

  # 🧩 Einzelberechtigungen
  KSRSQLWhitelist.add:
    description: Allows adding players to the whitelist
    default: op

  KSRSQLWhitelist.del:
    description: Allows removing players from the whitelist
    default: op

  KSRSQLWhitelist.on:
    description: Allows enabling the whitelist
    default: op

  KSRSQLWhitelist.off:
    description: Allows disabling the whitelist
    default: op

  whitelist.staff:
    description: Allows entering protected worlds
    default: op

# --------------------------------------------------------------------------
# ⚙️ COMMANDS
# --------------------------------------------------------------------------

commands:
  whitelist:
    description: SQL whitelist command interceptor (replaces vanilla /whitelist)
    usage: /whitelist <add|remove|rm|del|on|off|list|reload|info|resync>
    permission: minecraft.command.whitelist